name: Docker

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - Pipfile
      - Pipfile.lock
      - backend/**
      - frontend/**
      - fixtures/**
      - .github/workflows/docker.yml
  pull_request:
    paths:
      - Dockerfile
      - Pipfile
      - Pipfile.lock
      - backend/**
      - frontend/**
      - fixtures/**
      - .github/workflows/docker.yml

jobs:
  docker-build:
    name: Docker build + smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build image
        run: docker build -t claude-sessions-ui:ci .

      - name: Generate fixture data
        run: python fixtures/generate.py --output-dir /tmp/claude-test

      - name: Smoke test — API responds with fixture sessions
        run: |
          docker run -d \
            --name claude-sessions-ui-ci \
            -p 8765:8765 \
            -v /tmp/claude-test:/root/.claude \
            claude-sessions-ui:ci
          # Wait for uvicorn to be ready (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8765/api/sessions > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
          done
          n=$(curl -sf http://localhost:8765/api/sessions | python3 -c "import sys,json; print(len(json.load(sys.stdin)['sessions']))")
          if [ "$n" -ge 5 ]; then
            echo "OK — sessions endpoint returned ${n} sessions"
          else
            echo "Expected >=5 sessions, got ${n}"; exit 1
          fi

      - name: Dump logs on failure
        if: failure()
        run: docker logs claude-sessions-ui-ci 2>&1 || true
