name: Docker

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - Pipfile
      - Pipfile.lock
      - backend/**
      - frontend/**
  pull_request:
    paths:
      - Dockerfile
      - Pipfile
      - Pipfile.lock
      - backend/**
      - frontend/**

jobs:
  docker-build:
    name: Docker build + smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t claude-sessions-ui:ci .

      - name: Smoke test — API responds
        run: |
          mkdir -p /tmp/claude-test/projects
          docker run -d \
            --name claude-sessions-ui-ci \
            -p 8765:8765 \
            -v /tmp/claude-test:/root/.claude \
            claude-sessions-ui:ci
          # Wait for uvicorn to be ready (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8765/api/sessions > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8765/api/sessions | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'OK — sessions endpoint returned {len(d[\"sessions\"])} sessions')"

      - name: Dump logs on failure
        if: failure()
        run: docker logs claude-sessions-ui-ci 2>&1 || true
