name: Auto Approve and Merge

# Fires after any of the required CI workflows complete on a PR.
# When all conditions are met (CI green, no unresolved Copilot threads) the
# workflow approves the PR and squash-merges it.
#
# Prerequisite (one-time repo setting):
#   Settings → Actions → General → "Allow GitHub Actions to approve pull requests" ✓

on:
  workflow_run:
    workflows: [Lint, Test, "CHANGELOG updated"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-approve-merge:
    runs-on: ubuntu-latest
    # Only act on PR-triggered runs (not direct pushes to main)
    if: github.event.workflow_run.event == 'pull_request'

    steps:
      - name: Get PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
          ALLOWED_AUTHOR: morissette
        run: |
          PR_JSON=$(gh api "repos/$REPO/pulls?state=open&per_page=50" \
            --jq ".[] | select(.head.sha == \"$HEAD_SHA\") | {number: .number, author: .user.login}" | head -1)
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number // empty')
          PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.author // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for SHA $HEAD_SHA — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [ "$PR_AUTHOR" != "$ALLOWED_AUTHOR" ]; then
            echo "PR #$PR_NUMBER authored by $PR_AUTHOR (not $ALLOWED_AUTHOR) — skipping auto-merge"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check all CI checks pass
        id: ci
        if: steps.pr.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          # Collect conclusions for all completed checks on this PR's HEAD
          FAILING=$(gh pr checks "$PR" --repo "$REPO" 2>/dev/null \
            | awk '$2 == "fail" || $2 == "error" {print $1}')
          PENDING=$(gh pr checks "$PR" --repo "$REPO" 2>/dev/null \
            | awk '$2 == "pending" || $2 == "queued" || $2 == "in_progress" {print $1}')
          if [ -n "$FAILING" ]; then
            echo "Failing checks: $FAILING"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          elif [ -n "$PENDING" ]; then
            echo "Pending checks: $PENDING"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "All checks passed"
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check unresolved Copilot threads
        id: copilot
        if: steps.pr.outputs.skip == 'false' && steps.ci.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          UNRESOLVED=$(gh api graphql -f query='
          {
            repository(owner: "morissette", name: "claude-sessions-ui") {
              pullRequest(number: '"$PR"') {
                reviewThreads(first: 50) {
                  nodes {
                    isResolved
                    comments(first: 1) {
                      nodes { author { login } }
                    }
                  }
                }
              }
            }
          }' --jq '
            [.data.repository.pullRequest.reviewThreads.nodes[]
             | select(.isResolved == false)
             | select(.comments.nodes[0].author.login | ascii_downcase | contains("copilot"))]
             | length')
          echo "Unresolved Copilot threads: $UNRESOLVED"
          if [ "$UNRESOLVED" -gt 0 ]; then
            echo "clean=false" >> "$GITHUB_OUTPUT"
          else
            echo "clean=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Approve PR
        if: |
          steps.pr.outputs.skip == 'false' &&
          steps.ci.outputs.ready == 'true' &&
          steps.copilot.outputs.clean == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          # Skip if github-actions[bot] already approved
          ALREADY=$(gh api "repos/$REPO/pulls/$PR/reviews" \
            --jq '[.[] | select(.user.login == "github-actions[bot]" and .state == "APPROVED")] | length')
          if [ "$ALREADY" -gt 0 ]; then
            echo "Already approved by github-actions[bot]"
          else
            gh pr review "$PR" --repo "$REPO" --approve \
              --body "All CI checks pass and no unresolved Copilot review threads — auto-approving."
            echo "Approved PR #$PR"
          fi

      - name: Squash merge
        if: |
          steps.pr.outputs.skip == 'false' &&
          steps.ci.outputs.ready == 'true' &&
          steps.copilot.outputs.clean == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          gh pr merge "$PR" --repo "$REPO" --squash \
            --subject "$(gh pr view "$PR" --repo "$REPO" --json title --jq .title)"
          echo "Merged PR #$PR"
