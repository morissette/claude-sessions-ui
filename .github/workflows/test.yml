name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    name: pytest (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: pip install fastapi uvicorn psutil websockets prometheus-client pytest pytest-asyncio httpx
      - name: Run tests
        run: pytest tests/ -v

  vitest:
    name: Vitest (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run tests
        run: npm test
        working-directory: frontend
