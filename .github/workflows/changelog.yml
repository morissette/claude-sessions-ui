name: Changelog

on:
  pull_request:
    branches: [main]

jobs:
  changelog-updated:
    name: CHANGELOG.md updated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md modified
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^CHANGELOG\.md$'; then
            echo "CHANGELOG.md updated. OK."
          else
            echo "::error file=CHANGELOG.md::CHANGELOG.md must be updated in every PR. Add an entry under the appropriate version section."
            exit 1
          fi
